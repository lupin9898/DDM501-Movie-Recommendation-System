# Full MLOps stack for Movie Recommendation System
# Services: API, MLflow (PostgreSQL+MinIO), Elasticsearch+Kibana, Prometheus, Grafana, Evidently, Airflow
#
# Quick start (local):
#   cp .env.example .env   # edit passwords, then:
#   docker compose -f docker-compose.prod.yml up -d
#
# Start without Airflow (lighter):
#   docker compose -f docker-compose.prod.yml up -d \
#     --scale airflow-webserver=0 --scale airflow-scheduler=0
#
# UI access (local):  http://localhost:PORT directly in browser
#   MLflow   → http://localhost:5000
#   Grafana  → http://localhost:3000   (admin / GRAFANA_PASSWORD)
#   Kibana   → http://localhost:5601
#   Airflow  → http://localhost:8080   (admin / AIRFLOW_ADMIN_PASSWORD)
#   MinIO    → http://localhost:9001
#
# Remote server: SSH tunnel first
#   ssh -L 5000:localhost:5000 -L 3000:localhost:3000 -L 5601:localhost:5601 user@host

x-airflow-common: &airflow-common
  build:
    context: ./monitoring/airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY is required}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
    RECSYS_DATA_RAW_DIR: /opt/airflow/data/raw
    RECSYS_DATA_PROCESSED_DIR: /opt/airflow/data/processed
    RECSYS_ARTIFACTS_DIR: /opt/airflow/artifacts
    RECSYS_MLFLOW_TRACKING_URI: http://mlflow:5000
    RECSYS_MLFLOW_EXPERIMENT_NAME: movielens-recommendation
    PYTHONPATH: /opt/airflow
  volumes:
    - ./monitoring/airflow/dags:/opt/airflow/dags:ro
    - ./src:/opt/airflow/src:ro
    - airflow-logs:/opt/airflow/logs
    - ${RECSYS_DATA_DIR:-./data}:/opt/airflow/data
    - ${RECSYS_ARTIFACTS_DIR:-./artifacts}:/opt/airflow/artifacts
    - /var/run/docker.sock:/var/run/docker.sock:ro
  depends_on:
    postgres-init:
      condition: service_completed_successfully
  networks:
    - backend

services:
  # ────────────────────────────────────────────────────────────────────────────
  # DATABASE — shared by MLflow and Airflow
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_MULTIPLE_DATABASES: mlflow,airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./monitoring/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # OBJECT STORAGE — MinIO for MLflow artifacts
  # ────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API — needed by host training workflow
      - "127.0.0.1:9001:9001"   # Console UI — localhost only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_PASSWORD:?MINIO_PASSWORD is required};
      /usr/bin/mc mb myminio/mlflow-artifacts --ignore-existing;
      /usr/bin/mc anonymous set download myminio/mlflow-artifacts;
      echo 'MinIO bucket ready.';
      "
    networks:
      - backend

  # ────────────────────────────────────────────────────────────────────────────
  # POSTGRES INIT — idempotent user/DB sync on every deploy
  # Runs after postgres healthy; replaces one-shot init script for credentials.
  # ────────────────────────────────────────────────────────────────────────────
  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        PG="psql -h postgres -U postgres"
        $$PG -c "CREATE USER mlflow WITH PASSWORD '$$DB_PASSWORD';" 2>/dev/null || true
        $$PG -c "ALTER USER mlflow WITH PASSWORD '$$DB_PASSWORD';"
        $$PG -tc "SELECT 1 FROM pg_database WHERE datname='mlflow'" | grep -q 1 \
          || $$PG -c "CREATE DATABASE mlflow OWNER mlflow;"
        $$PG -c "GRANT ALL PRIVILEGES ON DATABASE mlflow TO mlflow;"
        $$PG -c "CREATE USER airflow WITH PASSWORD '$$DB_PASSWORD';" 2>/dev/null || true
        $$PG -c "ALTER USER airflow WITH PASSWORD '$$DB_PASSWORD';"
        $$PG -tc "SELECT 1 FROM pg_database WHERE datname='airflow'" | grep -q 1 \
          || $$PG -c "CREATE DATABASE airflow OWNER airflow;"
        $$PG -c "GRANT ALL PRIVILEGES ON DATABASE airflow TO airflow;"
        echo "Postgres users and databases ready."
    restart: "no"
    networks:
      - backend

  # ────────────────────────────────────────────────────────────────────────────
  # ML EXPERIMENT TRACKING — MLflow with PostgreSQL + MinIO backend
  # ────────────────────────────────────────────────────────────────────────────
  mlflow:
    build:
      context: ./monitoring/mlflow
      dockerfile: Dockerfile
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/mlflow
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination s3://mlflow-artifacts/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_IGNORE_TLS: "true"
    ports:
      - "127.0.0.1:5000:5000"   # localhost only
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # CORE API — builds from source if API_IMAGE is not set
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE:-recsys-api:local}
    ports:
      - "8000:8000"             # Public endpoint
    environment:
      RECSYS_MODEL_PATH: /app/artifacts/model.pkl
      RECSYS_DATA_PROCESSED_DIR: /app/data/processed
      RECSYS_LOG_LEVEL: info
      RECSYS_MLFLOW_TRACKING_URI: http://mlflow:5000
      RECSYS_MLFLOW_EXPERIMENT_NAME: movielens-recommendation
    volumes:
      - ${RECSYS_ARTIFACTS_DIR:-./artifacts}:/app/artifacts
      - ${RECSYS_DATA_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # DRIFT DETECTION — Evidently AI
  # ────────────────────────────────────────────────────────────────────────────
  evidently:
    build:
      context: ./monitoring/evidently
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      RECSYS_API_URL: http://api:8000
      EVIDENTLY_REFERENCE_WINDOW: 7d
      EVIDENTLY_DRIFT_THRESHOLD: "0.1"
    volumes:
      - evidently-data:/app/data
      - ${RECSYS_DATA_DIR:-./data}:/app/recsys-data:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # METRICS — Prometheus + Grafana
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD secret is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # LOGGING — Elasticsearch + Kibana + Filebeat (no Logstash)
  # Filebeat ships logs directly to Elasticsearch
  # ────────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  kibana-init:
    image: curlimages/curl:latest
    entrypoint: ["/bin/sh", "/provisioning/init.sh"]
    volumes:
      - ./monitoring/kibana:/provisioning:ro
    environment:
      KIBANA_URL: http://kibana:5601
      SAVED_OBJECTS_FILE: /provisioning/saved-objects.ndjson
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./monitoring/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # ORCHESTRATION — Apache Airflow (LocalExecutor)
  # ────────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    # Use /bin/bash entrypoint to bypass Airflow's custom /entrypoint which
    # rejects non-airflow commands (e.g. /bin/sh) with exit 127 when docker-compose
    # wraps a string `command:` in `/bin/sh -c`. We re-invoke /entrypoint explicitly
    # so it handles DB migration and user creation via env vars (official approach).
    entrypoint: /bin/bash
    command:
      - -c
      - exec /entrypoint airflow version
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  minio-data:
  evidently-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  airflow-logs:

# ────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ────────────────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
