services:
  api:
    # Dùng image đã build sẵn từ CI — không build lại tại đây
    image: recsys-api:deploy
    ports:
      - "8000:8000"
    environment:
      - RECSYS_MODEL_PATH=/app/artifacts/model.pkl
      - RECSYS_LOG_LEVEL=info
      - RECSYS_MLFLOW_TRACKING_URI=sqlite:///mlflow/mlflow.db
    volumes:
      # Chia sẻ artifacts với trainer (model.pkl)
      - model-data:/app/artifacts
      # MLflow DB dùng chung với mlflow service
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_started

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/:/etc/grafana/provisioning/dashboards/:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  model-data:
  mlflow-data:
  grafana-data:
