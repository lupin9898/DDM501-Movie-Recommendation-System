name: Deploy

on:
  # Tự động trigger sau khi CI (ci.yml) pass trên main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Cho phép trigger thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted

    # Chỉ deploy khi CI pass (với workflow_run trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: production

    steps:
      - uses: actions/checkout@v4

      # tr '[:upper:]' '[:lower:]' — portable trên cả macOS lẫn Linux
      - name: Lowercase repository name
        run: echo "REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── Xác định image tag ────────────────────────────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      # ── Đăng nhập registry ────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Pull image mới ────────────────────────────────────────────────────
      - name: Pull latest image
        run: |
          IMAGE="ghcr.io/${{ env.REPO }}/recsys-api:${{ steps.tag.outputs.tag }}"
          echo "Pulling $IMAGE"
          docker pull "$IMAGE"
          docker tag "$IMAGE" recsys-api:deploy

      # ── Deploy với docker-compose.prod.yml ───────────────────────────────
      - name: Deploy services
        env:
          RECSYS_MODEL_VERSION: ${{ steps.tag.outputs.tag }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          docker compose -f docker-compose.prod.yml pull --ignore-pull-failures
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.prod.yml ps

      # ── Health check sau deploy ───────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting for service to be ready..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60s"
          docker compose -f docker-compose.prod.yml logs api --tail=50
          exit 1

      # ── Rollback nếu deploy thất bại ─────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          echo "Deploy failed — rolling back to previous container..."
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d || echo "Rollback failed — manual intervention required"

      # ── Notify kết quả ───────────────────────────────────────────────────
      - name: Notify deploy result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy SUCCESS — tag=${{ steps.tag.outputs.tag }}"
          else
            echo "Deploy FAILED — check logs above"
          fi
