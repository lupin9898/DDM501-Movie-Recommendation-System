name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Unit Tests
        run: pytest tests/ -v --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t recsys-api:${{ github.sha }} --target server .
      - name: Run container smoke test
        run: |
          docker run -d -p 8000:8000 --name test-api recsys-api:${{ github.sha }} || true
          sleep 10
          curl -f http://localhost:8000/health || echo "Smoke test skipped (no model artifact)"
          docker stop test-api || true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Container Registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/recsys-api:latest --target server .
          docker tag ghcr.io/${{ github.repository }}/recsys-api:latest ghcr.io/${{ github.repository }}/recsys-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/recsys-api:latest
          docker push ghcr.io/${{ github.repository }}/recsys-api:${{ github.sha }}
      - name: Deploy
        run: |
          echo "Deploy step — configure with your hosting provider"
          echo "Example: docker-compose pull && docker-compose up -d"
