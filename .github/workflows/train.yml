name: Train

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: "Model type to train"
        required: false
        default: "als"
        type: choice
        options:
          - als
          - content_based
          - popular
          - random
      force_preprocess:
        description: "Force re-download data and reprocess (bỏ qua cache)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Lịch tự động: mỗi Chủ nhật 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"

jobs:
  train:
    name: Train Model (${{ github.event.inputs.model_type || 'als' }})
    runs-on: self-hosted

    env:
      MODEL_TYPE: ${{ github.event.inputs.model_type || 'als' }}
      RECSYS_MLFLOW_TRACKING_URI: "http://localhost:5000"
      RECSYS_MLFLOW_EXPERIMENT_NAME: "movielens-recommendation"
      # MinIO S3 credentials for MLflow artifact upload from host runner
      AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ROOT_USER }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_PASSWORD }}
      MLFLOW_S3_ENDPOINT_URL: "http://localhost:9000"
      MLFLOW_S3_IGNORE_TLS: "true"

    steps:
      - uses: actions/checkout@v4

      # ── Cài dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          # Dùng Python 3.11 tường minh, tránh Anaconda 3.13 trên PATH
          PY=$(command -v python3.11 || echo /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11)
          echo "Using Python: $PY ($($PY --version))"
          $PY -m pip install --upgrade pip
          $PY -m pip install --retries 5 --timeout 120 -r requirements.txt
          # Đặt python3 alias cho các bước sau
          echo "PYTHON=$PY" >> $GITHUB_ENV

      # ── Đặt đường dẫn persistent trên máy host ──────────────────────────
      # Dữ liệu và artifacts lưu ngoài workspace để tồn tại giữa các lần chạy
      - name: Set persistent data paths
        run: |
          DATA_RAW="$HOME/recsys-data/raw"
          DATA_PROCESSED="$HOME/recsys-data/processed"
          ARTIFACTS="$HOME/recsys-artifacts"
          mkdir -p "$DATA_RAW" "$DATA_PROCESSED" "$ARTIFACTS"
          echo "RECSYS_DATA_RAW_DIR=$DATA_RAW"         >> $GITHUB_ENV
          echo "RECSYS_DATA_PROCESSED_DIR=$DATA_PROCESSED" >> $GITHUB_ENV
          echo "RECSYS_ARTIFACTS_DIR=$ARTIFACTS"       >> $GITHUB_ENV

      # ── Download data ─────────────────────────────────────────────────────
      - name: Download raw data
        run: |
          FORCE="${{ github.event.inputs.force_preprocess || 'false' }}"
          if [ "$FORCE" = "true" ] || [ ! -f "$RECSYS_DATA_RAW_DIR/ratings.csv" ]; then
            echo "Downloading MovieLens dataset..."
            $PYTHON -m src.data.ingestion
          else
            echo "Raw data found — skipping download. (force_preprocess=false)"
          fi

      # ── Preprocess ───────────────────────────────────────────────────────
      - name: Preprocess data
        run: |
          FORCE="${{ github.event.inputs.force_preprocess || 'false' }}"
          if [ "$FORCE" = "true" ] || [ ! -f "$RECSYS_DATA_PROCESSED_DIR/train.parquet" ]; then
            echo "Running preprocessing..."
            $PYTHON -m src.data.preprocessing
          else
            echo "Processed data found — skipping. (force_preprocess=false)"
          fi

      # ── Train model ──────────────────────────────────────────────────────
      - name: Train model
        run: |
          echo "Training model: $MODEL_TYPE"
          $PYTHON -m src.training.train --model "$MODEL_TYPE"

      # ── Ghi metadata ─────────────────────────────────────────────────────
      - name: Save model metadata
        run: |
          if [ ! -f "$RECSYS_ARTIFACTS_DIR/model.pkl" ]; then
            echo "ERROR: model.pkl not found after training"
            exit 1
          fi
          echo "{\"model_type\": \"$MODEL_TYPE\", \"sha\": \"${{ github.sha }}\", \"run_id\": \"${{ github.run_id }}\", \"trained_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > "$RECSYS_ARTIFACTS_DIR/model_meta.json"
          echo "Model saved: $RECSYS_ARTIFACTS_DIR/model.pkl"

      # ── Copy model vào container và restart API ──────────────────────────
      - name: Deploy model to running API
        run: |
          CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "API container not running — skipping hot reload."
            echo "Start the API first with: docker compose -f docker-compose.prod.yml up -d"
            exit 0
          fi
          echo "Copying model into container $CONTAINER..."
          docker cp "$RECSYS_ARTIFACTS_DIR/model.pkl" "$CONTAINER:/app/artifacts/model.pkl"
          docker cp "$RECSYS_DATA_PROCESSED_DIR/." "$CONTAINER:/app/data/processed/"
          echo "Restarting API to load new model..."
          docker restart "$CONTAINER"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy after reload (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 5s..."
            sleep 5
          done
          echo "API did not become healthy — check logs:"
          docker compose -f docker-compose.prod.yml logs api --tail=30
          exit 1

      # ── Thông báo kết quả ────────────────────────────────────────────────
      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Training SUCCESS — model=$MODEL_TYPE sha=${{ github.sha }}"
          else
            echo "Training FAILED — check logs above"
          fi
