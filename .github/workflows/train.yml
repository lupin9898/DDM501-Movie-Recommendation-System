name: Train

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: "Model type to train"
        required: false
        default: "als"
        type: choice
        options:
          - als
          - content_based
          - popular
          - random
      force_preprocess:
        description: "Force re-download data and reprocess (bỏ qua cache)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Lịch tự động: mỗi Chủ nhật 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"

jobs:
  train:
    name: Train Model (${{ github.event.inputs.model_type || 'als' }})
    runs-on: self-hosted

    env:
      MODEL_TYPE: ${{ github.event.inputs.model_type || 'als' }}
      RECSYS_MLFLOW_TRACKING_URI: "http://localhost:5000"
      RECSYS_MLFLOW_EXPERIMENT_NAME: "movielens-recommendation"
      # --serve-artifacts on MLflow server proxies artifact uploads → runner không cần S3 credentials

    steps:
      - uses: actions/checkout@v4

      # ── Install Python deps ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          PY=$(command -v python3.11 || echo /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11)
          echo "Using Python: $PY ($($PY --version))"
          $PY -m pip install --upgrade pip
          $PY -m pip install --retries 5 --timeout 120 -r requirements.txt
          echo "PYTHON=$PY" >> $GITHUB_ENV

      # ── Set persistent host paths (shared with docker bind mounts) ───────
      # Must match RECSYS_DATA_DIR / RECSYS_ARTIFACTS_DIR in the compose .env
      # so training writes land in the same volume the API reads from.
      - name: Set persistent data paths
        run: |
          DATA_DIR="${RECSYS_DATA_DIR_HOST:-$HOME/recsys-data}"
          ARTIFACTS_DIR="${RECSYS_ARTIFACTS_DIR_HOST:-$HOME/recsys-artifacts}"
          mkdir -p "$DATA_DIR/raw" "$DATA_DIR/processed" "$ARTIFACTS_DIR"
          echo "RECSYS_DATA_RAW_DIR=$DATA_DIR/raw"             >> $GITHUB_ENV
          echo "RECSYS_DATA_PROCESSED_DIR=$DATA_DIR/processed" >> $GITHUB_ENV
          echo "RECSYS_ARTIFACTS_DIR=$ARTIFACTS_DIR"           >> $GITHUB_ENV
          echo "RECSYS_DATA_DIR=$DATA_DIR"                     >> $GITHUB_ENV
          echo "GIT_SHA=${{ github.sha }}"                     >> $GITHUB_ENV

      # ── Download raw data ────────────────────────────────────────────────
      - name: Download raw data
        run: |
          FORCE="${{ github.event.inputs.force_preprocess || 'false' }}"
          if [ "$FORCE" = "true" ] || [ ! -f "$RECSYS_DATA_RAW_DIR/ratings.csv" ]; then
            echo "Downloading MovieLens dataset..."
            $PYTHON -m src.data.ingestion
          else
            echo "Raw data found — skipping download. (force_preprocess=false)"
          fi

      # ── Preprocess ───────────────────────────────────────────────────────
      - name: Preprocess data
        run: |
          FORCE="${{ github.event.inputs.force_preprocess || 'false' }}"
          if [ "$FORCE" = "true" ] || [ ! -f "$RECSYS_DATA_PROCESSED_DIR/train.parquet" ]; then
            echo "Running preprocessing..."
            $PYTHON -m src.data.preprocessing
          else
            echo "Processed data found — skipping. (force_preprocess=false)"
          fi

      # ── Train model ──────────────────────────────────────────────────────
      - name: Train model
        run: |
          echo "Training model: $MODEL_TYPE"
          $PYTHON -m src.training.train --model "$MODEL_TYPE"
          # train.py writes both model.pkl AND model_meta.json into $RECSYS_ARTIFACTS_DIR.
          test -f "$RECSYS_ARTIFACTS_DIR/model.pkl"      || { echo "model.pkl missing";      exit 1; }
          test -f "$RECSYS_ARTIFACTS_DIR/model_meta.json" || { echo "model_meta.json missing"; exit 1; }
          echo "Model artifacts in $RECSYS_ARTIFACTS_DIR:"
          ls -la "$RECSYS_ARTIFACTS_DIR"

      # ── Reload API ───────────────────────────────────────────────────────
      # Bind-mounted volume means the new model is already visible to the API
      # container; a restart is all that's needed for the service to pick it up.
      - name: Reload API
        run: |
          if ! docker compose -f docker-compose.prod.yml ps api --status running | grep -q api; then
            echo "API container not running — nothing to reload."
            echo "Start the stack with: make docker-up"
            exit 0
          fi
          echo "Restarting API to pick up new model..."
          docker compose -f docker-compose.prod.yml restart api
          for i in $(seq 1 24); do
            VERSION=$(curl -fsS http://localhost:8000/health 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('trained_at','?'))" 2>/dev/null || echo "")
            if [ -n "$VERSION" ] && [ "$VERSION" != "?" ]; then
              echo "API healthy after reload (attempt $i) — trained_at=$VERSION"
              exit 0
            fi
            echo "Attempt $i: waiting for API health..."
            sleep 5
          done
          echo "API did not become healthy within 2 minutes. Logs:"
          docker compose -f docker-compose.prod.yml logs api --tail=50
          exit 1

      # ── Report ───────────────────────────────────────────────────────────
      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Training SUCCESS — model=$MODEL_TYPE sha=${{ github.sha }}"
            [ -f "$RECSYS_ARTIFACTS_DIR/model_meta.json" ] && cat "$RECSYS_ARTIFACTS_DIR/model_meta.json"
          else
            echo "Training FAILED — check logs above"
          fi
