name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format check
        run: ruff format --check src/ tests/

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Docker build + smoke test ─────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: false
          load: true
          tags: recsys-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health
        run: |
          docker run -d \
            -p 8000:8000 \
            --name smoke-api \
            recsys-api:${{ github.sha }}
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          docker stop smoke-api
          echo "Health check status: $STATUS"
          # 200 = healthy, 503 = no model loaded (still OK for CI)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "Unexpected status $STATUS — failing build"
            exit 1
          fi

  # ── Push image to registry (main only, builds natively on self-hosted Mac) ──
  push:
    name: Push Image
    runs-on: self-hosted          # Mac arm64 → build arm64 natively, không cần QEMU
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # tr portable trên macOS lẫn Linux
      - name: Lowercase repository name
        run: echo "REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          platforms: linux/arm64   # native trên Mac M-series, không cần QEMU
          tags: |
            ghcr.io/${{ env.REPO }}/recsys-api:latest
            ghcr.io/${{ env.REPO }}/recsys-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test the actual arm64 image that was pushed (amd64 build was tested above,
      # this closes the gap so the deployed image is always verified)
      - name: Smoke test arm64 image
        run: |
          docker pull ghcr.io/${{ env.REPO }}/recsys-api:${{ github.sha }}
          docker run -d -p 18000:8000 --name smoke-arm64 \
            ghcr.io/${{ env.REPO }}/recsys-api:${{ github.sha }}
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18000/health || echo "000")
          docker stop smoke-arm64 && docker rm smoke-arm64
          echo "arm64 health check: $STATUS"
          # 200 = healthy, 503 = degraded (no model) — both are valid API starts
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "Unexpected status $STATUS — arm64 image failed health check"
            exit 1
          fi
