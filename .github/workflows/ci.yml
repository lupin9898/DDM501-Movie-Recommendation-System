name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format check
        run: ruff format --check src/ tests/

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Docker build + smoke test ─────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: false
          tags: recsys-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health
        run: |
          docker run -d \
            -p 8000:8000 \
            --name smoke-api \
            recsys-api:${{ github.sha }}
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          docker stop smoke-api
          echo "Health check status: $STATUS"
          # 200 = healthy, 503 = no model loaded (still OK for CI)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "Unexpected status $STATUS — failing build"
            exit 1
          fi

  # ── Push image to registry (main only) ────────────────────────────────────
  push:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/recsys-api:latest
            ghcr.io/${{ github.repository }}/recsys-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
