filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

# Only collect logs from recsys services
processors:
  - drop_event:
      when:
        not:
          or:
            - contains:
                container.name: "api"
            - contains:
                container.name: "mlflow"
            - contains:
                container.name: "airflow"
            - contains:
                container.name: "evidently"
  - decode_json_fields:
      fields: ["message"]
      target: "json"
      overwrite_keys: true
      add_error_key: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "recsys-logs-%{+yyyy.MM.dd}"

setup.template.name: "recsys-logs"
setup.template.pattern: "recsys-logs-*"
setup.ilm.enabled: false

logging.level: warning
