global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "recommendation-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "evidently"
    static_configs:
      - targets: ["evidently:8001"]
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /metrics
    scrape_interval: 30s
