input {
  beats {
    port => 5044
  }
}

filter {
  # Parse Docker container metadata
  if [container][name] {
    mutate {
      add_field => { "service" => "%{[container][name]}" }
    }
  }

  # Parse JSON log lines from the API
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Parse structured Python log lines:
  # "2026-04-12 15:05:38 | src.serving.app | INFO | message"
  if [message] =~ /\d{4}-\d{2}-\d{2}/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \| %{DATA:logger} \| %{LOGLEVEL:log_level} \| %{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
      tag_on_failure => ["_grok_parse_failure"]
    }
  }

  # Drop health check noise
  if [log_message] =~ "GET /health" {
    drop {}
  }

  mutate {
    remove_field => ["agent", "ecs", "input"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "recsys-logs-%{+YYYY.MM.dd}"
  }
}
